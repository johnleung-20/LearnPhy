<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>content</title>
    <style>
    /* Define a clean fade-in and slide-up animation */
    @keyframes fadeInSlide {
        from {
            opacity: 0;
            transform: translate(-50%, -40%); /* Start slightly lower */
        }
        to {
            opacity: 1;
            transform: translate(-50%, -50%); /* End at perfect center */
        }
    }

    body {
        margin: 0;
        padding: 0;
        background-color: #fcfcfc;
        font-family: sans-serif;
    }

    /* Background image wrapper */
    .bg_img {
        position: relative;
        width: 100%;
        height: 100vh;
        opacity: 0.3;
        /* Simple opacity fade for background so it doesn't jump around */
        animation: fadeIn 2s ease-in-out; 
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 0.3; }
    }

    /* Title styling */
    .title {
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: fadeInSlide 2s ease-out forwards;
    }

    /* Entry button styling */
    .entry {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 30px;
        border: 2px solid black;
        border-radius: 10px;
        padding: 10px 20px;
        text-decoration: none;
        background-color: white;
        color: black;
        transition: background-color 0.3s ease;
        animation: fadeInSlide 2s ease-out forwards;
    }

    .entry:hover {
        background-color: lightgray;
    }
</style>
</head> 
    
    
<body >
        <div class = "content">
          <h1 class = "title">Let learn physics together</h1>
          
        </div>
        

        
        <div class = "bg_img">
            <img src="img1.png" alt="background image" width="100%" height="100%">
        </div>
        
        <div class = "entry">
            <a href="http://127.0.0.1:5500/PAGE2.html">CLICK ME</a>
        </div>
    </body>




</html>
